version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: exam_generator_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password_change_me
      MYSQL_DATABASE: exam_generator
      MYSQL_USER: exam_user
      MYSQL_PASSWORD: exam_password_change_me
    ports:
      - "3306:3306"
    volumes:
      - ../data/mysql:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - exam_network

  redis:
    image: redis:7.0-alpine
    container_name: exam_generator_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ../data/redis:/data
    command: redis-server --appendonly yes
    networks:
      - exam_network

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: exam_generator_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ../data/qdrant:/qdrant/storage
    networks:
      - exam_network

networks:
  exam_network:
    driver: bridge
