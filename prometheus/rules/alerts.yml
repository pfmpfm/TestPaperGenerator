groups:
  - name: backend_alerts
    interval: 30s
    rules:
      # ==================== 应用健康告警 ====================
      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend 服务不可用"
          description: "Backend 服务 {{ $labels.instance }} 已经下线超过 1 分钟"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "后端错误率过高"
          description: "错误率: {{ $value | humanizePercentage }}"

      # ==================== 性能告警 ====================
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API 响应时间过慢"
          description: "P95 响应时间: {{ $value }}s"

      - alert: LLMRequestSlow
        expr: histogram_quantile(0.95, rate(llm_request_duration_seconds_bucket[5m])) > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LLM 请求耗时过长"
          description: "P95 LLM 请求时间: {{ $value }}s"

  - name: database_alerts
    interval: 30s
    rules:
      # ==================== MySQL 告警 ====================
      - alert: MySQLDown
        expr: up{job="mysql"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MySQL 服务不可用"
          description: "MySQL 已经下线超过 1 分钟"

      - alert: MySQLSlowQueries
        expr: rate(mysql_global_status_slow_queries[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MySQL 慢查询过多"
          description: "慢查询速率: {{ $value }}/s"

      - alert: MySQLConnectionsHigh
        expr: mysql_global_status_threads_connected / mysql_global_variables_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MySQL 连接数过高"
          description: "连接使用率: {{ $value | humanizePercentage }}"

  - name: redis_alerts
    interval: 30s
    rules:
      # ==================== Redis 告警 ====================
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis 服务不可用"
          description: "Redis 已经下线超过 1 分钟"

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis 内存使用率过高"
          description: "内存使用率: {{ $value | humanizePercentage }}"

      - alert: RedisEvictedKeys
        expr: rate(redis_evicted_keys_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis 频繁驱逐键"
          description: "驱逐速率: {{ $value }}/s"

  - name: resource_alerts
    interval: 30s
    rules:
      # ==================== 资源使用告警 ====================
      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU 使用率过高"
          description: "{{ $labels.instance }} CPU 使用率: {{ $value | humanizePercentage }}"

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / 4294967296 > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "内存使用率过高"
          description: "{{ $labels.instance }} 内存使用率: {{ $value | humanizePercentage }}"
